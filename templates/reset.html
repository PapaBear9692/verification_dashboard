<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login | Product Verification</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/pharma.png') }}">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,600,700&display=swap" rel="stylesheet">

  <!-- Custom CSS (unchanged) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
</head>

<body>

  <!-- Top Bar -->
  <header class="app-header">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center">
        <a href="https://www.squarepharma.com.bd/" class="brand d-flex align-items-center" target="_blank" rel="noopener">
          <img src="{{ url_for('static', filename='images/squarepharma.png') }}" alt="Square Pharmaceuticals PLC." class="brand-logo">
        </a>
      </div>
      <img src="{{ url_for('static', filename='images/square.png') }}" alt="Square Group" class="second-logo">
    </div>
  </header>

  <!-- Reset Password Section -->
  <main class="auth-wrapper">
    <div class="auth-card">

      <div class="text-center mb-4">
        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-subtitle" id="pageSubtitle">Enter your username to receive an OTP.</p>
      </div>

      <!-- ===================== STEP 1: Username + Request OTP ===================== -->
      <div id="step1">
        <form id="requestOtpForm" novalidate>

          <div class="mb-3">
            <label class="form-label">Username</label>
            <input
              type="text"
              id="username"
              class="form-control"
              placeholder="Enter username"
              autocomplete="username"
              required
            />
          </div>

          <button id="sendOtpBtn" type="submit" class="btn btn-primary w-100 mt-3" disabled>
            <i class="fas fa-paper-plane me-1"></i> Send OTP
          </button>

        </form>
      </div>
      <!-- /Step 1 -->

      <!-- ===================== STEP 2: Enter OTP ===================== -->
      <div id="step2" class="d-none">
        <form id="verifyOtpForm" novalidate>

          <!-- username carried forward (hidden) -->
          <input type="hidden" id="usernameForOtp" />

          <div class="mb-3">
            <label class="form-label">Enter OTP</label>
            <input
              type="text"
              id="otpInput"
              class="form-control text-center"
              placeholder="6-digit code"
              maxlength="6"
              inputmode="numeric"
              autocomplete="one-time-code"
              required
            />
            <div class="form-text" id="otpHint"></div>
          </div>

          <button id="verifyOtpBtn" type="submit" class="btn btn-primary w-100 mt-3" disabled>
            <i class="fas fa-check-circle me-1"></i> Verify OTP
          </button>

        </form>

        <!-- Resend -->
        <div class="text-center mt-3">
          <button class="btn btn-link p-0 small" id="resendBtn" onclick="goBackToStep1()">
            <i class="fas fa-rotate-left me-1"></i> Resend OTP
          </button>
        </div>
      </div>
      <!-- /Step 2 -->

      <!-- ===================== STEP 3: New Password ===================== -->
      <div id="step3" class="d-none">
        <form id="resetForm" novalidate>

          <!-- username carried forward (hidden) -->
          <input type="hidden" id="usernameForReset" />

          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input
              type="password"
              id="newPassword"
              class="form-control"
              placeholder="Enter new password"
              minlength="8"
              required
            />
          </div>

          <div class="mb-2">
            <label class="form-label">Confirm New Password</label>
            <input
              type="password"
              id="confirmNewPassword"
              class="form-control"
              placeholder="Re-enter new password"
              minlength="8"
              required
            />
            <div id="matchError" class="error-text d-none">
              <i class="fas fa-circle-exclamation"></i> Passwords do not match
            </div>
          </div>

          <button id="submitBtn" type="submit" class="btn btn-primary w-100 mt-3" disabled>
            <i class="fas fa-paper-plane me-1"></i> Reset Password
          </button>

        </form>
      </div>
      <!-- /Step 3 -->

      <!-- ===================== SUCCESS BOX ===================== -->
      <div id="approvalBox" class="approval-box d-none" role="status" aria-live="polite">
        <div class="approval-icon">
          <i class="fas fa-circle-check"></i>
        </div>
        <div>
          <div class="approval-title">Password reset successfully</div>
          <div class="approval-subtitle" id="responseMsg"></div>
        </div>
      </div>

      <div class="auth-links mt-3">
        <a href="{{ url_for('login_page') }}" class="auth-link">
          <i class="fas fa-arrow-left me-1"></i> Back to Login
        </a>
      </div>

      <div class="auth-footer mt-4">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
          <p class="mb-0">
            © 2026 <a href="https://www.squarepharma.com.bd" target="_blank" rel="noopener">Square Pharmaceuticals PLC.</a>
            All rights reserved.
          </p>
        </div>
      </div>

    </div>
  </main>

  <!-- JS -->
  <script src="{{ url_for('static', filename='js/reset.js') }}"></script>

</body>
</html>
