<!DOCTYPE html>
<html lang="en">
<head>
  <title>Verify OTP | Product Verification</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/pharma.png') }}">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,600,700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/verify-otp.css') }}">
</head>

<body>

  <!-- Top Bar -->
  <header class="app-header">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center">
        <a href="https://www.squarepharma.com.bd/" class="brand d-flex align-items-center" target="_blank" rel="noopener">
          <img src="{{ url_for('static', filename='images/squarepharma.png') }}" alt="Square Pharmaceuticals PLC." class="brand-logo">
        </a>
      </div>
      <img src="{{ url_for('static', filename='images/square.png') }}" alt="Square Group" class="second-logo">
    </div>
  </header>

  <!-- OTP Verification Section -->
  <main class="auth-wrapper">
    <div class="auth-card">

      <div class="text-center mb-4">
        <div class="otp-icon mb-3">
          <i class="fas fa-shield-alt"></i>
        </div>
        <h2 class="auth-title">Verify Your Identity</h2>
        <p class="auth-subtitle" id="pageSubtitle">
          We've sent a 6-digit code to your registered email
        </p>
      </div>

      <form id="verifyOtpForm" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <!-- Username (hidden) -->
        <input type="hidden" id="username" />

        <!-- Context (registration or reset) -->
        <input type="hidden" id="context" />

        <!-- OTP Input -->
        <div class="mb-4">
          <label class="form-label">One-Time Password (OTP)</label>
          <div class="otp-input-container">
            <input
              type="text"
              id="otpInput"
              class="form-control otp-input text-center"
              placeholder="000000"
              maxlength="6"
              inputmode="numeric"
              autocomplete="one-time-code"
              required
            />
          </div>
          <div class="form-text text-center mt-2" id="otpHint">
            Check your email for the verification code
          </div>
          <span id="otpError" class="text-danger d-block mt-2"></span>
        </div>

        <!-- Submit Button -->
        <button id="verifyBtn" type="submit" class="btn btn-primary w-100" disabled>
          <i class="fas fa-check-circle me-2"></i> Verify OTP
        </button>

      </form>

      <!-- Resend Section -->
      <div class="text-center mt-4 pt-3 border-top border-subtle">
        <p class="text-muted mb-2">Didn't receive the code?</p>
        <button id="resendBtn" type="button" class="btn btn-link p-0">
          <i class="fas fa-redo me-1"></i> <span id="resendText">Resend OTP</span>
        </button>
        <div id="resendCounter" class="small text-muted mt-2 d-none">
          Resend available in <span id="countdown">60</span>s
        </div>
      </div>

      <!-- Back Link -->
      <div class="text-center mt-4">
        <a id="backLink" href="#" class="text-decoration-none">
          <i class="fas fa-arrow-left me-1"></i> Go Back
        </a>
      </div>

    </div>
  </main>

  <!-- Toast Notification -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert">
      <div class="toast-header">
        <i class="fas fa-info-circle me-2"></i>
        <strong class="me-auto" id="toastTitle">Notice</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
      </div>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/verify-otp.js') }}"></script>
</body>

</html>
